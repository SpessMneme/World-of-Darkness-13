name: CI Suite
on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
jobs:
  run_linters:
    if: ${{ !contains(github.event.head_commit.message, '[ci skip]') }}
    name: Run Linters
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tgui/package-lock.json'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgit2-dev python3-dev php
      - name: Setup Tool Permissions
        run: |
          chmod +x tools/bootstrap/python
          chmod +x tools/bootstrap/node
          chmod +x tools/ci/*.sh
          chmod +x tools/deploy.sh
      - name: Setup Python Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            tools/bootstrap/.cache
          key: ${{ runner.os }}-pip-${{ hashFiles('tools/requirements.txt') }}
      - name: Setup SpacemanDMM Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/SpacemanDMM
          key: ${{ runner.os }}-spacemandmm-${{ hashFiles('tools/ci/install_spaceman_dmm.sh') }}
      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r tools/requirements.txt
      - name: Install Tools
        run: |
          bash tools/ci/install_node.sh
          bash tools/ci/install_spaceman_dmm.sh dreamchecker
          tools/bootstrap/python -c ''
      - name: Install tgui dependencies
        working-directory: tgui
        run: npm ci
      - name: Create output directory
        run: mkdir -p ${{ github.workspace }}/output
      - name: Run Linters
        run: |
          bash tools/ci/check_filedirs.sh tgstation.dme
          bash tools/ci/check_changelogs.sh
          find . -name "*.php" -print0 | xargs -0 -n1 php -l
          find . -name "*.json" -not -path "*/node_modules/*" -print0 | xargs -0 python ./tools/json_verifier.py
          npm run lint --prefix tgui
          bash tools/ci/check_grep.sh
          tools/bootstrap/python -m dmi.test
          tools/bootstrap/python -m mapmerge2.dmm_test
          ${{ github.workspace }}/dreamchecker > ${{ github.workspace }}/output/output-annotations.txt 2>&1
      - name: Annotate Lints
        uses: yogstation13/DreamAnnotate@v2
        if: always()
        with:
          outputFile: output/output-annotations.txt

  compile_all_maps:
    if: ${{ !contains(github.event.head_commit.message, '[ci skip]') }}
    name: Compile Maps
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tgui/package-lock.json'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgit2-dev python3-dev
      - name: Setup Tool Permissions
        run: |
          chmod +x tools/bootstrap/python
          chmod +x tools/bootstrap/node
          chmod +x tools/ci/*.sh
          chmod +x tools/deploy.sh
      - name: Setup Python Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            tools/bootstrap/.cache
          key: ${{ runner.os }}-pip-${{ hashFiles('tools/requirements.txt') }}
      - name: Setup BYOND Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/BYOND
          key: ${{ runner.os }}-byond-${{ hashFiles('tools/ci/install_byond.sh') }}
      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r tools/requirements.txt
      - name: Install BYOND
        run: |
          bash tools/ci/install_byond.sh
          echo "$GITHUB_WORKSPACE/BYOND/byond/bin" >> $GITHUB_PATH
      - name: Install tgui dependencies
        working-directory: tgui
        run: npm ci
      - name: Build tgui
        working-directory: tgui
        run: npm run build
      - name: Compile All Maps
        run: |
          export PATH=$GITHUB_WORKSPACE/BYOND/byond/bin:$PATH
          python tools/ci/template_dm_generator.py
          bash tools/ci/dm.sh -DCIBUILDING -DCITESTING -DALL_MAPS tgstation.dme

  run_all_tests:
    if: ${{ !contains(github.event.head_commit.message, '[ci skip]') }}
    name: Integration Tests
    runs-on: ubuntu-22.04
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tg_ci
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tgui/package-lock.json'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgit2-dev python3-dev build-essential
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_i386.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg --add-architecture i386
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_i386.deb
      - name: Setup Tool Permissions
        run: |
          chmod +x tools/bootstrap/python
          chmod +x tools/bootstrap/node
          chmod +x tools/ci/*.sh
          chmod +x tools/deploy.sh
      - name: Setup Python Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            tools/bootstrap/.cache
          key: ${{ runner.os }}-pip-${{ hashFiles('tools/requirements.txt') }}
      - name: Setup BYOND Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/BYOND
          key: ${{ runner.os }}-byond-${{ hashFiles('tools/ci/install_byond.sh') }}
      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r tools/requirements.txt
      - name: Setup database
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot tg_ci < SQL/tgstation_schema.sql
          mysql -h127.0.0.1 -P3306 -uroot -proot -e 'CREATE DATABASE IF NOT EXISTS tg_ci_prefixed;'
          mysql -h127.0.0.1 -P3306 -uroot -proot tg_ci_prefixed < SQL/tgstation_schema_prefixed.sql
      - name: Install rust-g
        run: bash tools/ci/install_rust_g.sh
      - name: Install BYOND
        run: |
          bash tools/ci/install_byond.sh
          echo "$GITHUB_WORKSPACE/BYOND/byond/bin" >> $GITHUB_PATH
      - name: Install tgui dependencies
        working-directory: tgui
        run: npm ci
      - name: Build tgui
        working-directory: tgui
        run: npm run build
      - name: Compile and run tests
        run: |
          export PATH=$GITHUB_WORKSPACE/BYOND/byond/bin:$PATH
          bash tools/ci/dm.sh -DCIBUILDING tgstation.dme
          bash tools/ci/run_server.sh

  test_windows:
    if: ${{ !contains(github.event.head_commit.message, '[ci skip]') }}
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tgui/package-lock.json'
      - name: Setup Python Cache
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
            tools\bootstrap\.cache
          key: ${{ runner.os }}-pip-${{ hashFiles('tools/requirements.txt') }}
      - name: Install Python Requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r tools/requirements.txt
      - name: Setup Tool Permissions
        shell: bash
        run: |
          chmod +x tools/bootstrap/python
          chmod +x tools/bootstrap/node
          chmod +x tools/ci/*.sh
          chmod +x tools/deploy.sh
      - name: Install tgui dependencies
        working-directory: tgui
        run: npm ci
      - name: Build tgui
        working-directory: tgui
        run: npm run build
      - name: Compile
        run: pwsh tools/ci/build.ps1
      - name: Create artifact
        shell: bash
        run: |
          mkdir -p deploy
          bash tools/deploy.sh ./deploy
      - name: Deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy
          path: deploy
          retention-days: 30
